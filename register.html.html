<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create your Bagicha account and start building your dream garden today." />
    <title>Sign Up — Bagicha</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/styleregister.css" />
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-card__logo">
                <span class="auth-card__logo-icon">🌿</span>
                <span class="auth-card__logo-text">Bagicha</span>
            </div>
            <h1 class="auth-card__title">Create Your Account</h1>
            <p class="auth-card__subtitle">Join thousands of plant lovers and start your garden journey.</p>
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label class="form-group__label" for="regName">Full Name</label>
                    <input class="form-group__input" type="text" id="regName" placeholder="e.g. Aarav Sharma" required />
                    <div class="form-group__error" id="regNameError"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-group__label" for="regEmail">Email Address</label>
                        <input class="form-group__input" type="email" id="regEmail" placeholder="you@example.com" required />
                        <div class="form-group__error" id="regEmailError"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-group__label" for="regPhone">Phone Number</label>
                        <input class="form-group__input" type="tel" id="regPhone" placeholder="+91 9876543210" required />
                        <div class="form-group__error" id="regPhoneError"></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-group__label" for="regPassword">Password</label>
                        <input class="form-group__input" type="password" id="regPassword" placeholder="Min. 6 characters" required />
                        <div class="form-group__error" id="regPasswordError"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-group__label" for="regConfirmPassword">Confirm Password</label>
                        <input class="form-group__input" type="password" id="regConfirmPassword" placeholder="Repeat password" required />
                        <div class="form-group__error" id="regConfirmError"></div>
                    </div>
                </div>
                <button type="submit" class="btn btn--primary btn--lg" style="width: 100%; margin-top: var(--sp-4);">Create Account 🌱</button>
            </form>
            <div class="auth-card__footer">Already have an account? <a href="index.html">Back to Bagicha</a></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="js/script.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
